# Rustfmt Configuration for MiMi Project

# Maximum line length
max_width = 100

# Edition
edition = "2021"

# Formatting style
hard_tabs = false
tab_spaces = 4

# Imports
reorder_imports = true
reorder_modules = true

# Functions
fn_params_layout = "Tall"

# Match expressions
match_block_trailing_comma = true
