name: C++ CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/pandora-memory/**'
      - 'crates/odlaguna-watchdog/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/cpp-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/pandora-memory/**'
      - 'crates/odlaguna-watchdog/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx_compiler: g++
          - os: windows-latest
            compiler: msvc
            cxx_compiler: cl
          - os: macos-latest
            compiler: clang
            cxx_compiler: clang++
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: 3.25.x
      
      - name: Setup build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nlohmann-json3-dev
      
      - name: Setup build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake nlohmann-json
      
      - name: Create build directory
        run: cmake -E make_directory ${{runner.workspace}}/build
      
      - name: Configure CMake
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: cmake --build . --config Release --parallel
      
      - name: Run unit tests
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure --verbose
      
      - name: Run clang-tidy (Ubuntu)
        if: runner.os == 'Linux'
        working-directory: ${{runner.workspace}}/build
        continue-on-error: true
        run: |
          sudo apt-get install -y clang-tidy
          cmake --build . --target clang-tidy || true

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: 3.25.x
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cppcheck nlohmann-json3-dev
      
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            --error-exitcode=1 crates/pandora-memory crates/odlaguna-watchdog || true
